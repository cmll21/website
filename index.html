<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jacob Ng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }

      body {
        background: #fff;
        color: #000;
        font-family: "Space Mono", monospace;
      }

      a { color: inherit; text-decoration: none; }
      a:hover { text-decoration: underline; }

      .page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 1fr auto;
        padding: clamp(24px, 5vw, 52px);
      }

      /* ── main ── */
      .main {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding-bottom: clamp(28px, 5vw, 56px);
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(72px, 16vw, 220px);
        font-weight: 900;
        line-height: 0.85;
        letter-spacing: -0.03em;
        margin: 0;
      }

      h1 i {
        font-weight: 400;
        font-style: italic;
      }

      /* ── footer ── */
      .ft {
        border-top: 1px solid #000;
        padding-top: 16px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.13em;
      }

      .ft-links {
        display: flex;
        gap: 28px;
      }

      @media (max-width: 480px) {
        .ft { flex-direction: column; gap: 10px; }
        .ft-links { gap: 18px; }
      }
    </style>
  </head>
  <body>
    <div class="page">

      <main class="main">
        <h1>Jacob<br><i>Ng.</i></h1>
      </main>

      <footer class="ft">
        <span>jacob@jacob.ng</span>
        <div class="ft-links">
          <a href="mailto:jacob@jacob.ng">Mail</a>
          <a href="https://github.com/cmll21">GitHub</a>
        </div>
      </footer>

    </div>
  </body>
</html>
