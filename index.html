<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jacob Ng</title>
    <meta
      name="description"
      content="Jacob Ng's portfolio shell: software engineering, trading systems, and applied machine learning projects, experience, and contact links."
    />
    <link rel="canonical" href="https://jacob.ng/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jacob.ng/" />
    <meta property="og:title" content="Jacob Ng" />
    <meta
      property="og:description"
      content="Portfolio shell for Jacob Ng featuring projects, experience, and links."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Jacob Ng" />
    <meta
      name="twitter:description"
      content="Portfolio shell for Jacob Ng featuring projects, experience, and links."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      :root {
        color-scheme: dark;
        --bg: #11111b;
        --panel: #1e1e2e;
        --panel-2: #181825;
        --panel-3: #313244;
        --line: #313244;
        --line-strong: #45475a;
        --text: #cdd6f4;
        --muted: #a6adc8;
        --soft: #bac2de;
        --accent: #a6e3a1;
        --blue: #89b4fa;
        --accent-2: #fab387;
        --danger: #f38ba8;
        --shadow: rgba(0, 0, 0, 0.58);
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: linear-gradient(135deg, #11111b 0%, #181825 48%, #11111b 100%);
        color: var(--text);
        font-family: "Space Mono", monospace;
      }

      ::selection {
        background: rgba(166, 227, 161, 0.28);
        color: var(--text);
      }

      a {
        color: var(--blue);
        text-decoration: none;
      }

      a:hover,
      a:focus {
        text-decoration: underline;
      }

      a:focus-visible {
        outline: 1px solid rgba(137, 180, 250, 0.72);
        outline-offset: 3px;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 48px;
      }

      .shell {
        width: min(1040px, 100%);
        height: min(820px, calc(100vh - 96px));
        min-height: 620px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid rgba(166, 173, 200, 0.24);
        border-radius: 8px;
        background: rgba(10, 15, 20, 0.94);
        box-shadow: 0 26px 90px var(--shadow);
        overflow: hidden;
      }

      .chrome {
        min-height: 48px;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 0 18px;
        border-bottom: 1px solid rgba(166, 173, 200, 0.18);
        background: var(--panel-2);
      }

      .lights {
        display: flex;
        gap: 8px;
      }

      .light {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--muted);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.24);
      }

      .light:nth-child(1) {
        background: #ff6b6b;
      }

      .light:nth-child(2) {
        background: #f6c177;
      }

      .light:nth-child(3) {
        background: var(--accent);
      }

      .title {
        color: var(--muted);
        font-size: 13px;
        line-height: 1;
        white-space: nowrap;
      }

      .terminal {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        overflow: hidden;
        background:
          linear-gradient(rgba(205, 214, 244, 0.025) 1px, transparent 1px),
          var(--panel);
        background-size: 100% 28px;
      }

      .masthead {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 28px;
        padding: 34px 36px 26px;
        border-bottom: 1px solid rgba(166, 173, 200, 0.14);
      }

      h1 {
        max-width: 720px;
        margin: 0;
        color: var(--text);
        font-family: "Playfair Display", serif;
        font-size: 64px;
        line-height: 1;
        font-weight: 900;
      }

      .kicker {
        margin: 12px 0 0;
        max-width: 680px;
        color: var(--soft);
        font-size: 15px;
        line-height: 1.8;
      }

      .status {
        align-self: start;
        min-width: 210px;
        border-left: 1px solid rgba(166, 227, 161, 0.34);
        padding: 2px 0 2px 18px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.8;
      }

      .status strong {
        display: block;
        color: var(--accent);
        font-size: 13px;
        font-weight: 400;
      }

      .output {
        min-height: 0;
        padding: 28px 36px 0;
        overflow-x: hidden;
        overflow-y: auto;
        scroll-behavior: smooth;
        scrollbar-color: var(--line-strong) transparent;
        scrollbar-width: thin;
      }

      .output::-webkit-scrollbar {
        width: 10px;
      }

      .output::-webkit-scrollbar-track {
        background: transparent;
      }

      .output::-webkit-scrollbar-thumb {
        background: rgba(166, 173, 200, 0.34);
        border: 3px solid transparent;
        border-radius: 8px;
        background-clip: content-box;
      }

      .output::-webkit-scrollbar-thumb:hover {
        background: rgba(137, 180, 250, 0.46);
        background-clip: content-box;
      }

      .line {
        margin: 0 0 12px;
        color: var(--soft);
        font-size: 15px;
        line-height: 1.75;
        overflow-wrap: anywhere;
      }

      .line.command {
        color: var(--text);
      }

      .line.error {
        color: var(--danger);
      }

      .line .prompt {
        color: var(--accent);
      }

      .line .muted {
        color: var(--muted);
      }

      .input-row {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 10px;
        padding: 18px 36px 32px;
        border-top: 1px solid rgba(166, 173, 200, 0.14);
        background: var(--panel);
      }

      .input-row label {
        color: var(--accent);
        font-size: 15px;
        line-height: 1.4;
        white-space: nowrap;
      }

      #terminal-input {
        width: 100%;
        border: 0;
        outline: 0;
        appearance: none;
        border-radius: 0;
        padding: 0;
        background: transparent;
        color: var(--text);
        caret-color: var(--accent-2);
        font: inherit;
        font-size: 15px;
      }

      #terminal-input::placeholder {
        color: #657485;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 760px) {
        .page {
          padding: 18px;
          place-items: stretch;
        }

        .shell {
          height: calc(100svh - 36px);
          min-height: 0;
        }

        .terminal {
          min-height: 0;
        }

        .masthead {
          grid-template-columns: 1fr;
          gap: 20px;
          padding: 28px 22px 22px;
        }

        h1 {
          font-size: 48px;
          line-height: 1.05;
        }

        .kicker,
        .line,
        .input-row label,
        #terminal-input {
          font-size: 14px;
        }

        .status {
          min-width: 0;
          width: 100%;
        }

        .output {
          padding: 22px 22px 0;
        }

        .input-row {
          padding: 16px 22px 24px;
        }
      }

      @media (max-width: 420px) {
        .chrome {
          gap: 12px;
          padding: 0 14px;
        }

        .title {
          font-size: 11px;
        }

        h1 {
          font-size: 38px;
          line-height: 1.08;
        }

        .input-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="shell" aria-label="Jacob Ng terminal profile">
        <div class="chrome" aria-hidden="true">
          <div class="lights">
            <span class="light"></span>
            <span class="light"></span>
            <span class="light"></span>
          </div>
          <div class="title">jacob.ng - terminal profile</div>
        </div>

        <section class="terminal" id="terminal">
          <div class="masthead">
            <div>
              <h1>Jacob Ng.</h1>
              <p class="kicker">
                Ask the shell about me. Start with
                <a href="#terminal-input" data-command="help">help</a>, then try
                <a href="#terminal-input" data-command="whoami">whoami</a> or
                <a href="#terminal-input" data-command="projects">projects</a>.
              </p>
            </div>

            <aside class="status" aria-label="Profile status">
              <strong>status: online</strong>
              location: jacob.ng<br />
              mode: portfolio shell<br />
              contact: hi@jacob.ng
            </aside>
          </div>

          <div class="output" id="output" aria-live="polite"></div>

          <form class="input-row" id="terminal-form" autocomplete="off">
            <label for="terminal-input">visitor@jacob.ng:~$</label>
            <span class="sr-only">Enter a profile command</span>
            <input
              id="terminal-input"
              name="command"
              type="text"
              spellcheck="false"
              autocapitalize="off"
              placeholder="help"
              autofocus
            />
          </form>
        </section>
      </main>
    </div>

    <script>
      const output = document.querySelector("#output");
      const terminal = document.querySelector("#terminal");
      const form = document.querySelector("#terminal-form");
      const input = document.querySelector("#terminal-input");
      const commandLinks = document.querySelectorAll("[data-command]");

      const commands = {
        help: [
          "Available commands:",
          "about: education, experience, projects, skills, whoami",
          "links: email, github, linkedin",
          "system: cat <file>, clear, date, help, history, ls, pwd",
        ],
        whoami: [
          "Jacob Ng.",
          "Computing and Software Systems student at the University of Melbourne, interested in software engineering, trading systems, and applied machine learning.",
        ],
        github: [
          'GitHub: <a href="https://github.com/cmll21" target="_blank" rel="noopener noreferrer">github.com/cmll21</a>',
        ],
        linkedin: [
          'LinkedIn: <a href="https://linkedin.com/in/ng-jacob" target="_blank" rel="noopener noreferrer">linkedin.com/in/ng-jacob</a>',
        ],
        email: [
          'Email: <a href="mailto:hi@jacob.ng">hi@jacob.ng</a>',
        ],
        education: [
          "Education:",
          "University of Melbourne - BSc, Computing & Software Systems, 2024-2026. First Class Honours.",
          "Wharton exchange, University of Pennsylvania, 2025. GPA 3.94/4.0.",
          "Melbourne Grammar School. ATAR 99.50.",
        ],
        experience: [
          "Experience:",
          "SWE Intern - Hudson River Trading - Singapore - 2026.",
          "SWE Intern - Jane Street - Hong Kong - 2025-2026.",
          "Vice President - Computing & Information Systems Students Association - Melbourne - 2024-Present.",
        ],
        projects: [
          "Projects:",
          "Real-Time Order Book & Trading Analytics System - C++ and TypeScript.",
          "NYT Games Solvers - Python, machine learning, and NLP for Wordle, Connections, and Strands.",
          "Fresh Produce Marketplace - React, Django, PostgreSQL, Docker. Best Product at CodeBrew Hackathon 2025.",
        ],
        skills: [
          "Skills:",
          "C++, Python, Rust, OCaml, TypeScript.",
          "Low-latency systems, asynchronous networking, ML/data tooling.",
        ],
        pwd: [
          "/home/jacob",
        ],
      };

      const files = {
        "about.txt": commands.whoami,
        "education.txt": commands.education,
        "experience.txt": commands.experience,
        "projects.txt": commands.projects,
        "skills.txt": commands.skills,
        "contact.txt": [
          'Email: <a href="mailto:hi@jacob.ng">hi@jacob.ng</a>',
          'GitHub: <a href="https://github.com/cmll21" target="_blank" rel="noopener noreferrer">github.com/cmll21</a>',
          'LinkedIn: <a href="https://linkedin.com/in/ng-jacob" target="_blank" rel="noopener noreferrer">linkedin.com/in/ng-jacob</a>',
        ],
      };

      const history = [];
      let historyIndex = 0;

      function appendLine(content, className = "") {
        const line = document.createElement("p");
        line.className = ["line", className].filter(Boolean).join(" ");
        line.innerHTML = content;
        output.appendChild(line);
        scrollOutputToBottom();
      }

      function printResponse(lines) {
        lines.forEach((line) => appendLine(line));
      }

      function scrollOutputToBottom() {
        requestAnimationFrame(() => {
          output.scrollTop = output.scrollHeight;
        });
      }

      function runCommand(rawCommand) {
        const trimmed = rawCommand.trim();
        if (!trimmed) {
          return;
        }

        appendLine(`<span class="prompt">visitor@jacob.ng:~$</span> ${escapeHtml(trimmed)}`, "command");
        history.push(trimmed);
        historyIndex = history.length;

        const command = trimmed.toLowerCase();

        if (command === "clear") {
          output.innerHTML = "";
          output.scrollTop = 0;
          return;
        }

        if (command === "date") {
          printResponse([new Date().toLocaleString()]);
          return;
        }

        if (command === "ls") {
          printResponse([
            "about.txt  contact.txt  education.txt",
            "experience.txt  projects.txt  skills.txt",
          ]);
          return;
        }

        if (command === "history") {
          printResponse(history.map((entry, index) => `${index + 1}  ${escapeHtml(entry)}`));
          return;
        }

        if (command.startsWith("cat")) {
          const parts = trimmed.split(/\s+/);

          if (parts.length === 1) {
            appendLine("cat: missing file operand", "error");
            return;
          }

          if (parts.length > 2) {
            appendLine(`cat: ${escapeHtml(trimmed)}: unsupported usage`, "error");
            return;
          }

          const filename = parts[1];

          if (files[filename]) {
            printResponse(files[filename]);
            return;
          }

          appendLine(`cat: ${escapeHtml(filename)}: No such file or directory`, "error");
          return;
        }

        if (commands[command]) {
          printResponse(commands[command]);
          return;
        }

        appendLine(
          `Command not found: ${escapeHtml(trimmed)}. Try <span class="muted">help</span>.`,
          "error"
        );
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        runCommand(input.value);
        input.value = "";
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "ArrowUp") {
          event.preventDefault();
          if (historyIndex > 0) {
            historyIndex -= 1;
            input.value = history[historyIndex];
          }
        }

        if (event.key === "ArrowDown") {
          event.preventDefault();
          if (historyIndex < history.length - 1) {
            historyIndex += 1;
            input.value = history[historyIndex];
          } else {
            historyIndex = history.length;
            input.value = "";
          }
        }
      });

      terminal.addEventListener("click", () => input.focus());

      commandLinks.forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          input.focus();
          runCommand(link.dataset.command);
          input.value = "";
        });
      });

      printResponse([
        "Welcome. Try <span class=\"muted\">help</span> for available commands.",
        "Tip: commands are local to this page. No prompt leaves your browser.",
      ]);
    </script>
  </body>
</html>
