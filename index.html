<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jacob Ng</title>
    <meta
      name="description"
      content="Jacob Ng's portfolio shell: software engineering, trading systems, and applied machine learning projects, experience, and contact links."
    />
    <link rel="canonical" href="https://jacob.ng/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jacob.ng/" />
    <meta property="og:title" content="Jacob Ng" />
    <meta
      property="og:description"
      content="Portfolio shell for Jacob Ng featuring projects, experience, and links."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Jacob Ng" />
    <meta
      name="twitter:description"
      content="Portfolio shell for Jacob Ng featuring projects, experience, and links."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        image-rendering: pixelated;
        font-family: 'Monaco', 'Courier New', monospace;
        -webkit-font-smoothing: none;
      }

      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }

      body {
        background-color: #fff;
        background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='2' height='2'><rect width='1' height='1' x='0' y='0' fill='%23000'/><rect width='1' height='1' x='1' y='1' fill='%23000'/></svg>");
        background-size: 2px 2px;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
      }

      .window {
        background: #fff;
        border: 2px solid #000;
        box-shadow: 4px 4px 0 #000;
        width: 440px;
        max-width: calc(100vw - 24px);
        display: flex;
        flex-direction: column;
        position: absolute;
        left: 100px;
        top: 80px;
        cursor: default;
        user-select: none;
      }

      .titlebar {
        background: repeating-linear-gradient(
          90deg, #000 0px, #000 1px, #fff 1px, #fff 2px
        );
        border-bottom: 2px solid #000;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        flex-shrink: 0;
        cursor: move;
      }

      .title-text {
        background: #fff;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 700;
        font-family: 'Geneva', system-ui, sans-serif;
        line-height: 20px;
        pointer-events: none;
      }

      .closebox {
        position: absolute;
        left: 6px;
        top: 4px;
        width: 13px;
        height: 13px;
        border: 2px solid #000;
        background: #fff;
        cursor: pointer;
      }

      .window-body {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .content {
        flex: 1;
        padding: 22px 22px 26px;
        font: 400 12px/1.85 'Monaco', 'Courier New', monospace;
        color: #000;
        -webkit-font-smoothing: none;
        overflow-x: hidden;
        overflow-y: auto;
        max-height: calc(100vh - 160px);
        user-select: text;
        cursor: text;
      }

      .content a {
        color: #000;
        text-decoration: none;
      }

      .content a:hover {
        text-decoration: underline;
      }

      .login-line {
        margin-bottom: 16px;
        color: #888;
      }

      .prompt-line {
        margin-bottom: 16px;
      }

      .prompt-bold {
        font-weight: 700;
      }

      .readme-name {
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 3px;
      }

      .readme-role {
        color: #555;
        margin-bottom: 20px;
      }

      .readme-links {
        margin-bottom: 0;
      }

      .link-label {
        color: #aaa;
      }

      .output {
        margin-top: 16px;
      }

      .output-line {
        margin-bottom: 0;
        line-height: 1.85;
      }

      .output-line.cmd {
        font-weight: 700;
      }

      .output-line.err {
        color: #c00;
      }

      .output-line.muted {
        color: #888;
      }

      .cursor-line {
        margin-top: 18px;
        display: flex;
        align-items: baseline;
      }

      .cursor {
        display: inline-block;
        width: 7px;
        height: 13px;
        background: #000;
        vertical-align: middle;
        animation: blink 1s step-end infinite;
        margin-left: 2px;
      }

      .input-form {
        display: flex;
        align-items: baseline;
        margin-top: 0;
      }

      .input-prompt {
        font-weight: 700;
        white-space: nowrap;
        margin-right: 4px;
      }

      .terminal-input {
        flex: 1;
        border: 0;
        outline: 0;
        appearance: none;
        background: transparent;
        color: #000;
        caret-color: #000;
        font: inherit;
        font-size: 12px;
        line-height: 1.85;
        -webkit-font-smoothing: none;
        padding: 0;
      }

      .scrollbar {
        width: 15px;
        border-left: 2px solid #000;
        background: repeating-linear-gradient(
          45deg, #000 0px, #000 1px, #fff 1px, #fff 4px
        );
        flex-shrink: 0;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 500px) {
        .window {
          left: 12px !important;
          top: 40px !important;
          width: calc(100vw - 24px);
        }

        .content {
          max-height: calc(100vh - 120px);
          padding: 16px 16px 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="window" id="window" aria-label="Jacob Ng terminal profile">
      <div class="titlebar" id="titlebar">
        <div class="closebox" aria-hidden="true"></div>
        <span class="title-text">jacob.ng — README</span>
      </div>
      <div class="window-body">
        <div class="content" id="content">
          <div class="login-line" id="login-line">Last login: <span id="login-date"></span> on ttys001</div>
          <div class="prompt-line"><span class="prompt-bold">web@jacob.ng:~$</span> cat README</div>
          <div class="readme-name">Jacob Ng</div>
          <div class="readme-role">software engineer.</div>
          <div class="readme-links">
            <span class="link-label">email&nbsp;&nbsp;&nbsp;&nbsp;</span><a href="mailto:mail@jacob.ng">mail@jacob.ng</a><br>
            <span class="link-label">linkedin&nbsp;</span><a href="https://linkedin.com/in/ng-jacob" target="_blank" rel="noopener noreferrer">linkedin.com/in/ng-jacob</a>
          </div>

          <div class="output" id="output" aria-live="polite"></div>

          <div class="cursor-line" id="cursor-line">
            <form class="input-form" id="terminal-form" autocomplete="off">
              <span class="prompt-bold input-prompt">web@jacob.ng:~$</span>
              <span class="sr-only">Enter a command</span>
              <input
                id="terminal-input"
                class="terminal-input"
                name="command"
                type="text"
                spellcheck="false"
                autocapitalize="off"
                autofocus
              />
            </form>
          </div>
        </div>
        <div class="scrollbar" aria-hidden="true"></div>
      </div>
    </main>

    <script>
      // Set login date
      document.getElementById('login-date').textContent = new Date().toDateString().replace(/^\w+\s/, d => d) + ' ' +
        new Date().toLocaleTimeString('en-US', { hour12: false }) + ' ' + new Date().toDateString().split(' ')[0];

      // Drag
      const win = document.getElementById('window');
      const titlebar = document.getElementById('titlebar');
      let dragging = false, ox = 0, oy = 0;

      titlebar.addEventListener('mousedown', e => {
        if (e.target.classList.contains('closebox')) return;
        dragging = true;
        ox = e.clientX - win.offsetLeft;
        oy = e.clientY - win.offsetTop;
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        win.style.left = (e.clientX - ox) + 'px';
        win.style.top = (e.clientY - oy) + 'px';
      });

      document.addEventListener('mouseup', () => { dragging = false; });

      // Terminal
      const output = document.getElementById('output');
      const form = document.getElementById('terminal-form');
      const input = document.getElementById('terminal-input');
      const content = document.getElementById('content');

      const commands = {
        help: [
          "Available commands:",
          "about: education, experience, projects, skills, whoami",
          "links: email, github, linkedin",
          "system: cat <file>, clear, date, help, history, ls, pwd",
        ],
        whoami: [
          "Jacob Ng.",
          "Computing and Software Systems student at the University of Melbourne, interested in software engineering, trading systems, and applied machine learning.",
        ],
        github: [
          'GitHub: <a href="https://github.com/cmll21" target="_blank" rel="noopener noreferrer">github.com/cmll21</a>',
        ],
        linkedin: [
          'LinkedIn: <a href="https://linkedin.com/in/ng-jacob" target="_blank" rel="noopener noreferrer">linkedin.com/in/ng-jacob</a>',
        ],
        email: [
          'Email: <a href="mailto:mail@jacob.ng">mail@jacob.ng</a>',
        ],
        education: [
          "Education:",
          "University of Melbourne - BSc, Computing & Software Systems, 2024-2026. First Class Honours.",
          "Wharton exchange, University of Pennsylvania, 2025. GPA 3.94/4.0.",
          "Melbourne Grammar School. ATAR 99.50.",
        ],
        experience: [
          "Experience:",
          "SWE Intern - Hudson River Trading - Singapore - 2026.",
          "SWE Intern - Jane Street - Hong Kong - 2025-2026.",
          "Vice President - Computing & Information Systems Students Association - Melbourne - 2024-Present.",
        ],
        projects: [
          "Projects:",
          "Real-Time Order Book & Trading Analytics System - C++ and TypeScript.",
          "NYT Games Solvers - Python, machine learning, and NLP for Wordle, Connections, and Strands.",
          "Fresh Produce Marketplace - React, Django, PostgreSQL, Docker. Best Product at CodeBrew Hackathon 2025.",
        ],
        skills: [
          "Skills:",
          "C++, Python, Rust, OCaml, TypeScript.",
          "Low-latency systems, asynchronous networking, ML/data tooling.",
        ],
        pwd: ["/home/jacob"],
      };

      const files = {
        "about.txt": commands.whoami,
        "education.txt": commands.education,
        "experience.txt": commands.experience,
        "projects.txt": commands.projects,
        "skills.txt": commands.skills,
        "contact.txt": [
          'Email: <a href="mailto:mail@jacob.ng">mail@jacob.ng</a>',
          'GitHub: <a href="https://github.com/cmll21" target="_blank" rel="noopener noreferrer">github.com/cmll21</a>',
          'LinkedIn: <a href="https://linkedin.com/in/ng-jacob" target="_blank" rel="noopener noreferrer">linkedin.com/in/ng-jacob</a>',
        ],
      };

      const cmdHistory = [];
      let historyIndex = 0;

      function escapeHtml(v) {
        return v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
      }

      function appendLine(html, cls) {
        const p = document.createElement('p');
        p.className = 'output-line' + (cls ? ' ' + cls : '');
        p.innerHTML = html;
        output.appendChild(p);
        requestAnimationFrame(() => { content.scrollTop = content.scrollHeight; });
      }

      function runCommand(raw) {
        const trimmed = raw.trim();
        if (!trimmed) return;

        appendLine('<span class="prompt-bold">web@jacob.ng:~$</span> ' + escapeHtml(trimmed), 'cmd');
        cmdHistory.push(trimmed);
        historyIndex = cmdHistory.length;

        const cmd = trimmed.toLowerCase();

        if (cmd === 'clear') {
          output.innerHTML = '';
          return;
        }
        if (cmd === 'date') {
          appendLine(new Date().toLocaleString());
          return;
        }
        if (cmd === 'ls') {
          appendLine('about.txt&nbsp;&nbsp;contact.txt&nbsp;&nbsp;education.txt');
          appendLine('experience.txt&nbsp;&nbsp;projects.txt&nbsp;&nbsp;skills.txt');
          return;
        }
        if (cmd === 'history') {
          cmdHistory.forEach((e, i) => appendLine((i + 1) + '  ' + escapeHtml(e)));
          return;
        }
        if (cmd.startsWith('cat')) {
          const parts = trimmed.split(/\s+/);
          if (parts.length === 1) { appendLine('cat: missing file operand', 'err'); return; }
          if (parts.length > 2) { appendLine('cat: ' + escapeHtml(trimmed) + ': unsupported usage', 'err'); return; }
          const fn = parts[1];
          if (files[fn]) { files[fn].forEach(l => appendLine(l)); return; }
          appendLine('cat: ' + escapeHtml(fn) + ': No such file or directory', 'err');
          return;
        }
        if (commands[cmd]) {
          commands[cmd].forEach(l => appendLine(l));
          return;
        }
        appendLine('Command not found: ' + escapeHtml(trimmed) + '. Try <span style="color:#888">help</span>.', 'err');
      }

      form.addEventListener('submit', e => {
        e.preventDefault();
        runCommand(input.value);
        input.value = '';
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (historyIndex > 0) { historyIndex--; input.value = cmdHistory[historyIndex]; }
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyIndex < cmdHistory.length - 1) { historyIndex++; input.value = cmdHistory[historyIndex]; }
          else { historyIndex = cmdHistory.length; input.value = ''; }
        }
      });

      content.addEventListener('click', () => input.focus());
    </script>
  </body>
</html>
