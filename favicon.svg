<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <pattern id="stripe" x="0" y="0" width="2" height="1" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#000"/>
      <rect x="1" width="1" height="1" fill="#fff"/>
    </pattern>
  </defs>
  <!-- Window -->
  <rect width="64" height="64" fill="#fff"/>
  <rect width="64" height="64" fill="none" stroke="#000" stroke-width="3"/>
  <!-- Title bar -->
  <rect x="1.5" y="1.5" width="61" height="14" fill="url(#stripe)"/>
  <rect x="0" y="14" width="64" height="2" fill="#000"/>
  <!-- Close box -->
  <rect x="5" y="4" width="9" height="9" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <!-- j -->
  <text x="32" y="52" font-family="Monaco, 'Courier New', monospace" font-size="34" font-weight="700" text-anchor="middle" fill="#000" style="-webkit-font-smoothing:none">j</text>
</svg>
